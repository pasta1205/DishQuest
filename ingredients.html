<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Use My Ingredients</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="ingredients.css" />
  </head>
  <body data-page="ingredients">
    <div class="recipe-finder-container">
      <div class="page-topbar">
        <a href="index.html" class="home-link">Back To Home</a>
      </div>

      <section class="page-hero">
        <p class="hero-label">Ingredients Mode</p>
        <h1>Cook With What You Have</h1>
        <p class="hero-text">
          Paste your available ingredients and get dish recommendations with
          process, image lookup, and helpful video links.
        </p>
      </section>

      <section class="page-card">
        <form id="ingredients-form" class="ingredients-box">
          <textarea
            id="ingredients-input"
            placeholder="Enter the ingredients you have (eg. onion, tomato, rice, paneer)"
          ></textarea>
          <button type="submit" id="ingredients-button">
            Recommend Dish
          </button>
        </form>
      </section>

      <div class="message" id="message-area">
        Enter your ingredients to get dish ideas.
      </div>

      <div class="results-grid" id="results-grid"></div>
    </div>

    <div class="modal-container hidden" id="recipe-modal">
      <div class="modal-content">
        <button id="modal-close-btn" class="modal-close-btn">+</button>
        <div id="recipe-details-content"></div>
      </div>
    </div>
    <script src="ingredients.js"></script>
  </body>
</html>
